<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>G&SENVIOS - Tarjeta de Tasa</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/cambios.css">
</head>

<body>
    <div class="container">
        <select id="country-selector" class="country-selector">
            <option value="honduras">🇭🇳 Honduras</option>
            <option value="colombia">🇨🇴 Colombia</option>
            <option value="republicaDominicana">🇩🇴 República Dominicana</option>
            <option value="estadosUnidos">🇺🇸 Estados Unidos</option>
            <option value="bolivia">🇧🇴 Bolivia</option>
        </select>

        <div id="export-card" class="exchange-card">
            <div class="card-header">
                <span>G&SENVIOS</span>&nbsp;con la mejor tasa de cambio
            </div>
            <div class="card-content">
                <div class="card-left">
                    <div class="country-title" id="card-country">HONDURAS</div>
                    <div class="country-divider"></div>
                    <div class="country-rate" id="card-rate">31,19 HNL</div>
                </div>
                <div class="card-right">
                    <div class="visual-circle">
                        <img id="card-visual" src="assets/visuals/honduras.png"
                            class="country-visual">
                    </div>
                </div>
            </div>
            <div class="card-disclaimer">
                La tasa de cambio puede variar al momento de realizar su envío.
            </div>
            <div class="card-footer">
                <div class="footer-date" id="card-date">05/05/2026</div>
                <div class="footer-time" id="card-time">Hora de Actualización 17:36</div>
            </div>
        </div>

        <button id="download-btn" class="btn-download">📸 EXPORTAR COMO IMAGEN</button>
    </div>

    <script src="js/data.js"></script>
    <script src="js/cambios.js"></script>
</body>

</html>
